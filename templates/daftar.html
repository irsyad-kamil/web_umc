<!DOCTYPE html>
<html>
<head>
    <title>Pendaftaran UMC</title>
</head>

<body>
    <h1>Form Pendaftaran UMC</h1>
    <p> 
        Silahkan isi formulir dibawah ini:
    </p>
    <br>

    <form action="/daftar" method="post">
        <h2>Peserta</h2>
        <label>Nama Siswa 1</label>
        <input type='text' name="siswa_1">
        </input>
        <br>
    
        <label>Email Siswa 1</label>
        <input type="email" name="email_siswa_1"></input>
        <br>

        <label>Nama Sekolah</label>
        <input type='text' name="asal_sekolah"></input>
        <br>

        <label>Jenjang</label>
        <select name="jenjang">
            <option>SD</option>
            <option>SMP</option>
            <option>SMA</option>
            <option>Perguruan Tinggi</option>
        </select>
        <br>

        <label>Alamat Sekolah</label>
        <textarea name="alamat"></textarea>
        <br>

        <h2>Data Guru</h2>
        <label>Nama Guru Pendamping</label>
        <input type="text" name="nama_guru"></input>
        <br>

        <label>Email Guru Pendamping</label>
        <input type="email" name="email_guru"></input>
        <br>

        <label>Nomor Telepon</label>
        <input type='text' name="nomor_hp_guru">
        </input>
        <br>
        <br>

        <!-- Dan seterusnya -->
        <br>
        <br>

        <button>Daftar</button>
        
    </form>
</body>

<style>
h1 {
    color: red;
    margin: 15px;
    font-size: 45px;
}

h2 {
    color: rgb(186, 72, 72);
    margin: 15px;
    font-size: 30px;
}

p {
    margin: 15px;
}

input, select, textarea {
    margin: 10px;
    padding: 5px;
}

button {
    color: rgb(255, 90, 90);
    border: 3px solid red;
    margin: 15px;
    padding: 10px;
}
</style>
</html>
